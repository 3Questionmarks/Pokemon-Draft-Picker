<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Draft Picker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Pokémon Draft Picker</h1>

  <!-- =========================
       SETUP SCREEN
       Configure players, dex, draft settings and mode.
       ========================= -->
  <section id="setup">
    <div class="setup-section">
      <h2>Players</h2>
      <label for="playerCount">Number of players</label>
      <input id="playerCount" type="number" class="number-input" min="1" max="20" value="2" />
      <div id="playerNameInputs"></div>
    </div>

    <div class="setup-section">
      <h2>Pokémon List</h2>
      <div class="dex-selection-row">
        <div>
          <label for="pokemonGameSelect">Game</label>
          <select id="pokemonGameSelect">
            <option value="all" selected>All</option>
            <option value="natDex">NatDex</option>
            <option value="infiniteFusion">Infinite Fusion</option>
            <option value="radicalRed">Radical Red</option>
          </select>


      
        </div>

        <div>
          <label for="pokemonDexSelect">Dex</label>
          <select id="pokemonDexSelect">
            <option value="stage1">Stage 1 Dex</option>
            <option value="fullyEvolved">Fully Evolved Dex</option>
            <option value="full" selected>All Pokémon</option>
          </select>
        </div>
      </div>

      <div class="custom-list-manager">
        <p class="filter-heading">Custom draft lists</p>
        <p class="custom-list-help">Imported lists are saved in this browser and can be selected here at any time.</p>
        <div class="imported-list-row">
          <div class="imported-list-select-group">
            <label for="importedListSelect">Saved list</label>
            <select id="importedListSelect">
              <option value="">None</option>
            </select>
          </div>
          <button class="main-button secondary-button" id="importCustomListButton" type="button" title="Import a custom list file. To make one, open View list, choose Custom List, pick Pokémon, then save/export it.">Import list</button>
          <input id="importCustomListInput" type="file" accept=".txt,.json" hidden />
          <button class="main-button danger-button" id="deleteImportedListButton" type="button" hidden title="Delete the selected saved list from this browser.">Delete saved list</button>
        </div>
        <p id="customListSetupStatus"></p>
        <p id="importedListStorageStatus" class="custom-list-storage-note"></p>
      </div>

      <div class="tag-filter-section">
        <p class="filter-heading">Include categories</p>
        <div class="tag-filter-row">
          <label class="checkbox-label" title="Box-style major legendaries and other strongest legendary-category Pokémon in this tool.">
            <input type="checkbox" class="tag-filter" value="legendary" checked />
            Legendaries
          </label>
          <label class="checkbox-label" title="Mythical Pokémon such as Mew, Celebi, Jirachi, Darkrai, Arceus, and similar event/mythical Pokémon.">
            <input type="checkbox" class="tag-filter" value="mythical" checked />
            Mythicals
          </label>
          <label class="checkbox-label" title="Legendary Pokémon below the main legendary category, such as roaming trios, Tapus, Loyal Three, Ogerpon, and similar Pokémon.">
            <input type="checkbox" class="tag-filter" value="subLegendary" checked />
            Sub-legendaries
          </label>
          <label class="checkbox-label" title="Non-legendary 600 BST evolution lines, such as Dragonite, Tyranitar, Metagross, Garchomp, Dragapult, and Baxcalibur.">
            <input type="checkbox" class="tag-filter" value="pseudoLegendary" checked />
            Pseudo-legendaries
          </label>
          <label class="checkbox-label" title="Paradox Pokémon and Ultra Beasts.">
            <input type="checkbox" class="tag-filter" value="paradoxUltraBeast" checked />
            Paradox / Ultra Beast
          </label>
        </div>

        <div class="tag-filter-row alternate-form-row">
          <label class="checkbox-label" title="Shows separate entries for mechanically different forms, such as regional forms, gender forms, Deoxys forms, Shaymin-Sky, Kyurem fusions, and Calyrex riders. When off, the base Pokémon may cycle through grouped sprites.">
            <input type="checkbox" id="includeAlternateForms" checked />
            Mechanically different forms
          </label>
          <label class="checkbox-label" title="Shows separate forms caused by abilities, such as Zen Mode, Schooling, Shields Down, Disguise, Zero to Hero, and Power Construct.">
            <input type="checkbox" id="includeAbilityForms" />
            Ability-based forms
          </label>
          <label class="checkbox-label" title="Shows separate forms caused by held items or equivalent item-style transformations, such as Megas, Primals, Origin forms, plates, drives, memories, masks, and crowned forms.">
            <input type="checkbox" id="includeItemForms" />
            Item-based forms
          </label>
        </div>
      </div>
    </div>

    <div class="setup-section">
      <h2>Draft total</h2>
      <label for="pokemonPerPlayer">Pokémon drafted per player</label>
      <input id="pokemonPerPlayer" type="number" class="number-input" min="1" max="100" value="10" />

      <label class="checkbox-label draft-all-label" title="Drafts as many Pokémon as possible while keeping every player on the same number of picks. Any leftover Pokémon that would make totals uneven are ignored.">
        <input type="checkbox" id="draftAllPossible" />
        Full Draft
      </label>

      <p id="setupStatus"></p>
    </div>

    <div class="setup-section">
      <h2>Mode</h2>
      <label for="draftMode">Draft mode</label>
      <select id="draftMode">
        <option value="classic">Classic: Players Pick from a Personal Pool</option>
        <option value="rounds">Market Draft: Players Pick from a Shared Pool</option>
        <option value="reverseClassic">Reverse Draft: Players Pick from a Personal Pool for Someone Else</option>
        <option value="reverseRounds">Reverse Market Draft: Players Pick from a Shared Pool for Someone Else</option>
      </select>

      <div class="mode-settings" id="reverseSettings">
        <label class="checkbox-label" title="When off, each player is randomly assigned another player to draft for at the start. When on, the receiving player is randomly chosen again each pick/round.">
          <input type="checkbox" id="reverseFullRandom" />
          Full random reverse targets
        </label>
      </div>

      <div class="mode-settings" id="classicSettings">
        <label for="classicChoiceCount">Pool Size</label>
        <input id="classicChoiceCount" type="number" class="number-input" min="1" max="10" value="3" />
      </div>

      <div class="mode-settings" id="marketSettings">
        <div class="mode-setting-row">
          <div>
            <label for="marketPokemonPerPlayerInPool">Pokémon per Player in Pool</label>
            <input id="marketPokemonPerPlayerInPool" type="number" class="number-input" min="1" max="5" value="1" />
          </div>
          <div>
            <label for="marketBonusCount">Bonus Pokémon Added to Pool</label>
            <input id="marketBonusCount" type="number" class="number-input" min="0" max="10" value="2" />
          </div>
        </div>
        <p id="marketPoolStatus"></p>
      </div>
    </div>

    <div class="setup-actions">
      <button class="main-button" id="startDraftButton">Start draft</button>
      <button class="main-button secondary-button" id="importDraftButton" type="button">Import draft</button>
      <button class="main-button secondary-button" id="viewListButton">View list</button>
      <input id="importDraftInput" type="file" accept=".txt,.json" hidden />
    </div>
    
  </section>

  <!-- =========================
       DRAFT SCREEN
       Active draft UI shown after Start Draft.
       ========================= -->
  <section id="draftArea">
    <div class="draft-controls">
      <button class="main-button" id="backToSetupButton">Back to Setup</button>
      <button class="main-button secondary-button" id="exportDraftButton" type="button">Export draft</button>
    </div>

    <div id="currentPlayer"></div>
    <div id="pokemonChoices"></div>
    <p id="status"></p>
    <div id="playerLists"></div>
  </section>

  <!-- =========================
       LIST VIEWER SCREEN
       Debug view for checking filtered Pokémon and sprites.
       ========================= -->
  <section id="listViewerArea">
    <div class="draft-controls">
      <button class="main-button" id="backFromListButton">Back to Setup</button>
      <button class="main-button secondary-button" id="enterCustomListModeButton" type="button" title="Create a new custom list or edit the selected saved list.">Custom List</button>
      <button class="main-button secondary-button" id="importCustomListFromListButton" type="button" title="Import a custom list file, save it in this browser, and open it here.">Import list</button>
      <button class="main-button secondary-button" id="exportCustomListButton" type="button" hidden title="Export the selected or currently edited custom list to a shareable file.">Export list</button>
      <button class="main-button save-button" id="exitCustomListModeButton" type="button" hidden>Save list</button>
      <button class="main-button danger-button" id="discardCustomListChangesButton" type="button" hidden>Discard changes</button>
    </div>

    <div class="list-mode-saved-list-row">
      <div class="imported-list-select-group">
        <label for="listModeImportedListSelect">Saved list</label>
        <select id="listModeImportedListSelect">
          <option value="">None</option>
        </select>
      </div>
      <button class="main-button danger-button" id="deleteImportedListFromListButton" type="button" hidden>Delete saved list</button>
    </div>

    <div class="draft-controls custom-list-bulk-controls" id="customListBulkControls" hidden>
      <button class="main-button secondary-button" id="selectAllCustomListButton" type="button">Select all shown</button>
      <button class="main-button secondary-button" id="deselectAllCustomListButton" type="button">Deselect all shown</button>
    </div>
    <p id="customListEditorStatus"></p>


    <div id="listViewerControls" class="list-viewer-controls">
      <h2>List filters</h2>

      <div class="dex-selection-row">
        <div>
          <label for="listGameSelect">Game</label>
          <select id="listGameSelect">
            <option value="all">All</option>
            <option value="natDex">NatDex</option>
            <option value="infiniteFusion">Infinite Fusion</option>
            <option value="radicalRed">Radical Red</option>
          </select>
        </div>

        <div>
          <label for="listDexSelect">Dex</label>
          <select id="listDexSelect">
            <option value="stage1">Stage 1 Dex</option>
            <option value="fullyEvolved">Fully Evolved Dex</option>
            <option value="full" selected>All Pokémon</option>
          </select>
        </div>
      </div>

      <div class="tag-filter-section">
        <p class="filter-heading">Categories</p>
        <div class="tag-filter-row">
          <label class="checkbox-label"><input type="checkbox" class="list-tag-filter" value="legendary" /> Legendaries</label>
          <label class="checkbox-label"><input type="checkbox" class="list-tag-filter" value="mythical" /> Mythicals</label>
          <label class="checkbox-label"><input type="checkbox" class="list-tag-filter" value="subLegendary" /> Sub-legendaries</label>
          <label class="checkbox-label"><input type="checkbox" class="list-tag-filter" value="pseudoLegendary" /> Pseudo-legendaries</label>
          <label class="checkbox-label"><input type="checkbox" class="list-tag-filter" value="paradoxUltraBeast" /> Paradox / Ultra Beast</label>
        </div>

        <div class="tag-filter-row alternate-form-row">
          <label class="checkbox-label"><input type="checkbox" id="listIncludeAlternateForms" /> Mechanically different forms</label>
          <label class="checkbox-label"><input type="checkbox" id="listIncludeAbilityForms" /> Ability-based forms</label>
          <label class="checkbox-label"><input type="checkbox" id="listIncludeItemForms" /> Item-based forms</label>
        </div>
      </div>

      <div class="list-extra-filter-grid">
        <div class="type-filter-pair">
          <label>Type</label>
          <div class="type-filter-controls">
            <select id="listTypeFilter" aria-label="Type 1">
              <option value="">Any type</option>
              <option value="Normal">Normal</option>
              <option value="Fire">Fire</option>
              <option value="Water">Water</option>
              <option value="Electric">Electric</option>
              <option value="Grass">Grass</option>
              <option value="Ice">Ice</option>
              <option value="Fighting">Fighting</option>
              <option value="Poison">Poison</option>
              <option value="Ground">Ground</option>
              <option value="Flying">Flying</option>
              <option value="Psychic">Psychic</option>
              <option value="Bug">Bug</option>
              <option value="Rock">Rock</option>
              <option value="Ghost">Ghost</option>
              <option value="Dragon">Dragon</option>
              <option value="Dark">Dark</option>
              <option value="Steel">Steel</option>
              <option value="Fairy">Fairy</option>
            </select>

            <span class="type-filter-plus">+</span>

            <select id="listTypeFilter2" aria-label="Type 2">
              <option value="">Any type</option>
              <option value="Normal">Normal</option>
              <option value="Fire">Fire</option>
              <option value="Water">Water</option>
              <option value="Electric">Electric</option>
              <option value="Grass">Grass</option>
              <option value="Ice">Ice</option>
              <option value="Fighting">Fighting</option>
              <option value="Poison">Poison</option>
              <option value="Ground">Ground</option>
              <option value="Flying">Flying</option>
              <option value="Psychic">Psychic</option>
              <option value="Bug">Bug</option>
              <option value="Rock">Rock</option>
              <option value="Ghost">Ghost</option>
              <option value="Dragon">Dragon</option>
              <option value="Dark">Dark</option>
              <option value="Steel">Steel</option>
              <option value="Fairy">Fairy</option>
            </select>
          </div>
        </div>

        <div class="evolution-stage-filter">
          <label for="listEvolutionStageFilter">Evolution stage</label>
          <select id="listEvolutionStageFilter">
            <option value="">Any stage</option>
            <option value="1">Stage 1</option>
            <option value="2">Stage 2</option>
            <option value="3">Stage 3</option>
          </select>
        </div>

        <div>
          <label for="listCanEvolveFilter">Can still evolve</label>
          <select id="listCanEvolveFilter">
            <option value="">Either</option>
            <option value="yes">Can evolve</option>
            <option value="no">Cannot evolve</option>
          </select>
        </div>

        <div>
          <label for="listMegaPrimalFilter">Mega / Primal</label>
          <select id="listMegaPrimalFilter">
            <option value="">Either</option>
            <option value="yes">Mega / Primal only</option>
            <option value="no">Exclude Mega / Primal</option>
          </select>
        </div>
      </div>

      <p id="listTypeFilterNote" class="filter-note"></p>
    </div>

    <p id="listViewerInstruction">Click a Pokémon to toggle it shiny.</p>

    <div class="list-search-row">
      <input id="listSearchInput" type="text" placeholder="Search Pokémon..." />
    </div>

    <p id="listViewerStatus"></p>

    <div id="pokemonListViewer"></div>
  </section>

  <script src="pokemon-data.js"></script>
  <script src="js/pokemon-utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/setup.js"></script>
  <script src="js/list-view.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/draft.js"></script>
  <script src="js/market-draft.js"></script>
  <script src="js/import-export.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
